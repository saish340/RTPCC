<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RTPCC Live Crowd Safety Dashboard</title>
  <style>
    :root { --bg:#f4f6f8; --card:#fff; --ink:#1e293b; --muted:#64748b; --line:#d9e1ea; --blue:#2563eb; --green:#16a34a; --yellow:#d97706; --orange:#ea580c; --red:#dc2626; }
    * { box-sizing:border-box; } body { margin:0; background:var(--bg); color:var(--ink); font:14px/1.4 system-ui,-apple-system,"Segoe UI",sans-serif; }
    header { padding:18px 24px; background:#172554; color:#fff; display:flex; gap:20px; align-items:center; flex-wrap:wrap; }
    h1 { font-size:21px; margin:0; } h2 { margin:0; font-size:16px; } label { font-weight:600; } input,select,button { font:inherit; padding:8px; border:1px solid #b9c4d2; border-radius:5px; }
    button { cursor:pointer; color:#fff; background:#2563eb; border-color:#2563eb; font-weight:700; } button:hover { background:#1d4ed8; }
    #apiBase { min-width:230px; } #connection { margin-left:auto; font-weight:700; } .online { color:#86efac; } .offline { color:#fca5a5; }
    main { display:grid; grid-template-columns:minmax(0,2fr) minmax(310px,1fr); gap:18px; padding:18px; max-width:1400px; margin:auto; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:16px; box-shadow:0 1px 2px #0f172a0c; }
    .graph-card { min-height:620px; } #venueSvg { width:100%; height:auto; min-height:510px; background:#fbfdff; border:1px solid var(--line); border-radius:6px; }
    .legend { display:flex; flex-wrap:wrap; gap:10px; margin:10px 0 14px; color:var(--muted); font-size:12px; } .legend span::before { content:""; display:inline-block; width:20px; height:4px; vertical-align:middle; margin-right:4px; background:var(--color); }
    .side { display:grid; align-content:start; gap:18px; } .controls { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin:12px 0; } .controls label { display:grid; gap:4px; } .controls button { grid-column:1 / -1; }
    #routeText { min-height:46px; padding:10px; background:#f8fafc; border-left:4px solid var(--blue); } #rerouteBanner { display:none; margin:10px 0 0; padding:10px; border-radius:5px; background:#fee2e2; color:#991b1b; font-weight:700; }
    .mute { font-weight:400; display:flex; align-items:center; gap:6px; margin-top:10px; } .mute input { margin:0; }
    #alerts { margin-top:12px; max-height:410px; overflow:auto; display:grid; gap:8px; } .alert { padding:9px; border-left:4px solid #94a3b8; background:#f8fafc; border-radius:4px; } .alert.reroute { border-color:var(--red); background:#fff1f2; font-weight:700; } .alert .time { color:var(--muted); font-size:12px; margin-bottom:3px; font-weight:400; }
    .svg-edge-label { font-size:13px; font-weight:700; fill:#334155; paint-order:stroke; stroke:#fff; stroke-width:4px; stroke-linejoin:round; } .svg-node-label { font-size:13px; font-weight:700; fill:#0f172a; text-anchor:middle; } .svg-node-sub { font-size:11px; fill:#475569; text-anchor:middle; }
    .flash { animation:flash 0.7s ease-in-out 5; } @keyframes flash { 50% { background:#fef08a; transform:scale(1.01); } }
    @media (max-width:850px) { main { grid-template-columns:1fr; } #connection { margin-left:0; } }
  </style>
</head>
<body>
  <header>
    <h1>RTPCC Live Crowd Safety</h1>
    <label>API <input id="apiBase" value="http://127.0.0.1:8000" aria-label="API base URL"></label>
    <span id="connection" class="offline">● Connecting…</span>
  </header>
  <main>
    <section class="card graph-card">
      <h2>Venue graph <small id="updated" style="color:#64748b;font-weight:400"></small></h2>
      <div class="legend">
        <span style="--color:#16a34a">Free flow</span><span style="--color:#eab308">High density</span><span style="--color:#f97316">Critical bottleneck</span><span style="--color:#dc2626">Stampede risk / blocked</span><span style="--color:#2563eb">Recommended route</span>
      </div>
      <svg id="venueSvg" viewBox="0 0 760 500" role="img" aria-label="Live venue graph"></svg>
    </section>
    <aside class="side">
      <section class="card">
        <h2>Recommended route</h2>
        <div class="controls">
          <label>Start <select id="start"></select></label>
          <label>End <select id="end"></select></label>
          <button id="findRoute">Find route</button>
        </div>
        <div id="routeText">Choose a start and end, then find a route.</div>
        <div id="rerouteBanner" role="status"></div>
      </section>
      <section class="card">
        <h2>Alert feed</h2>
        <label class="mute"><input id="mute" type="checkbox"> Mute PA announcements</label>
        <div id="alerts"><span style="color:#64748b">Waiting for alerts…</span></div>
      </section>
    </aside>
  </main>
  <script>
    const POLL_MS = 2000;
    const NS = "http://www.w3.org/2000/svg";
    const colors = { FREE_FLOW:"#16a34a", HIGH_DENSITY:"#eab308", CRITICAL_BOTTLENECK:"#f97316", STAMPEDE_RISK:"#dc2626" };
    const state = { graph:null, route:null, routeActive:false, alerts:[], alertKeys:new Set(), lastSeen:null, initializedAlerts:false, polling:false };
    const el = Object.fromEntries(["apiBase","connection","updated","venueSvg","start","end","findRoute","routeText","rerouteBanner","alerts","mute"].map(id => [id, document.getElementById(id)]));

    function baseUrl() { return el.apiBase.value.trim().replace(/\/$/, ""); }
    async function api(path) { const response = await fetch(baseUrl() + path); if (!response.ok) throw new Error(response.status + " " + response.statusText); return response.json(); }
    function svg(tag, attrs = {}, text = "") { const node = document.createElementNS(NS, tag); Object.entries(attrs).forEach(([key,value]) => node.setAttribute(key, value)); node.textContent = text; return node; }
    function edgeKey(a,b) { return [a,b].sort().join("|"); }

    // Adjust this function if a future venue needs a more geographic layout.
    function layoutForNodes(nodes) {
      const result = new Map(); const radiusX = 290, radiusY = 165, centerX = 380, centerY = 245;
      nodes.forEach((node, index) => { const angle = -Math.PI / 2 + (2 * Math.PI * index / Math.max(nodes.length, 1)); result.set(node.id, { x:centerX + radiusX * Math.cos(angle), y:centerY + radiusY * Math.sin(angle) }); });
      return result;
    }
    function routeEdges() {
      const set = new Set(); if (!state.route?.path || !state.graph) return set;
      for (let i=0; i<state.route.path.length-1; i++) set.add(edgeKey(state.route.path[i], state.route.path[i+1]));
      return set;
    }
    function drawGraph() {
      const graph = state.graph; el.venueSvg.replaceChildren(); if (!graph) return;
      const positions = layoutForNodes(graph.nodes), active = routeEdges();
      graph.edges.forEach(edge => {
        const a=positions.get(edge.from_node), b=positions.get(edge.to_node); if (!a || !b) return;
        const highlighted = active.has(edgeKey(edge.from_node, edge.to_node)), color = colors[edge.status] || "#64748b";
        if (highlighted) el.venueSvg.append(svg("line", { x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:"#2563eb","stroke-width":13,"stroke-linecap":"round",opacity:.38 }));
        el.venueSvg.append(svg("line", { x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:color,"stroke-width": highlighted ? 7 : 5,"stroke-linecap":"round","stroke-dasharray":edge.status === "STAMPEDE_RISK" ? "11 7" : "" }));
        const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
        el.venueSvg.append(svg("text", { x:mx,y:my-7,class:"svg-edge-label","text-anchor":"middle" }, `${edge.edge_id} · ${Number(edge.current_density).toFixed(1)} p/m²`));
      });
      graph.nodes.forEach(node => { const p=positions.get(node.id); el.venueSvg.append(svg("circle", { cx:p.x,cy:p.y,r:23,fill:"#fff",stroke:"#172554","stroke-width":3 })); el.venueSvg.append(svg("text", {x:p.x,y:p.y+5,class:"svg-node-label"}, node.id)); el.venueSvg.append(svg("text", {x:p.x,y:p.y+43,class:"svg-node-sub"}, node.name)); });
    }
    function populateNodes() {
      const oldStart=el.start.value, oldEnd=el.end.value; [el.start,el.end].forEach(select => select.replaceChildren());
      state.graph.nodes.forEach(node => [el.start,el.end].forEach(select => { const option=document.createElement("option"); option.value=node.id; option.textContent=`${node.id} — ${node.name}`; select.append(option); }));
      el.start.value = oldStart || state.graph.nodes[0]?.id || ""; el.end.value = oldEnd || state.graph.nodes.find(n=>n.type === "exit")?.id || state.graph.nodes[1]?.id || "";
    }
    function renderRoute() {
      if (!state.route) return;
      const path=state.route.path.join(" → "); el.routeText.innerHTML = `<strong>${path || "No available route"}</strong><br>Total cost: ${Number(state.route.total_cost).toFixed(1)}`;
      drawGraph();
    }
    function showReroute(oldPath, newPath) { el.rerouteBanner.textContent=`REROUTED: ${oldPath.join(" → ")} → ${newPath.join(" → ")}`; el.rerouteBanner.style.display="block"; el.rerouteBanner.classList.remove("flash"); void el.rerouteBanner.offsetWidth; el.rerouteBanner.classList.add("flash"); setTimeout(()=>{ el.rerouteBanner.style.display="none"; }, 10000); }
    function announce(alert) { if (el.mute.checked || !window.speechSynthesis) return; const risk=alert.event_type === "REROUTE" ? "Route changed. Please follow alternate route signage." : `High risk detected near ${alert.edge_id}. Please follow alternate route signage.`; speechSynthesis.cancel(); speechSynthesis.speak(new SpeechSynthesisUtterance("Alert. " + risk)); }
    function renderAlerts() { el.alerts.replaceChildren(); if (!state.alerts.length) { el.alerts.textContent="No alerts yet."; return; } state.alerts.forEach(alert => { const item=document.createElement("div"); item.className="alert" + (alert.event_type === "REROUTE" ? " reroute" : ""); const time=document.createElement("div"); time.className="time"; time.textContent=new Date(alert.timestamp).toLocaleTimeString(); const message=document.createElement("div"); message.textContent=`${alert.event_type}: ${alert.message}`; item.append(time,message); el.alerts.append(item); }); }
    async function pollGraph() { const graph=await api("/venue/graph"); const topologyChanged=!state.graph || graph.nodes.length!==state.graph.nodes.length || graph.edges.length!==state.graph.edges.length; state.graph=graph; if (topologyChanged) populateNodes(); drawGraph(); el.updated.textContent=`Updated ${new Date().toLocaleTimeString()}`; }
    async function pollRoute() { if (!state.routeActive) return; const route=await api(`/route?start=${encodeURIComponent(el.start.value)}&end=${encodeURIComponent(el.end.value)}`); const previous=state.route?.path; state.route=route; renderRoute(); if (route.rerouted && route.previous_path) showReroute(route.previous_path, route.path); else if (previous && previous.join("|") !== route.path.join("|")) showReroute(previous, route.path); }
    async function pollAlerts() { const query=state.lastSeen ? `?since=${encodeURIComponent(state.lastSeen)}` : ""; const response=await api("/alerts" + query); const incoming=response.alerts || []; if (incoming.length) { const chronological=[...incoming].reverse(); chronological.forEach(alert => { const key=[alert.timestamp,alert.edge_id,alert.event_type,alert.message].join("|"); if (state.alertKeys.has(key)) return; state.alertKeys.add(key); state.alerts.unshift(alert); if (state.initializedAlerts && (alert.event_type === "REROUTE" || (alert.event_type === "STATUS_CHANGE" && alert.new_status === "STAMPEDE_RISK"))) announce(alert); }); state.lastSeen=incoming.reduce((latest,a)=>!latest || a.timestamp>latest ? a.timestamp : latest,state.lastSeen); state.alerts=state.alerts.slice(0,100); renderAlerts(); } state.initializedAlerts=true; }
    function setConnection(ok) { el.connection.textContent=ok ? "● API connected" : "● API unreachable"; el.connection.className=ok ? "online" : "offline"; }
    async function tick() { if (state.polling) return; state.polling=true; try { await pollGraph(); await pollRoute(); await pollAlerts(); setConnection(true); } catch (_) { setConnection(false); } finally { state.polling=false; } }
    el.findRoute.addEventListener("click", async () => { state.routeActive=true; state.route=null; el.rerouteBanner.style.display="none"; await tick(); });
    el.apiBase.addEventListener("change", () => { state.lastSeen=null; state.initializedAlerts=false; state.alerts=[]; state.alertKeys.clear(); tick(); });
    tick(); setInterval(tick, POLL_MS);
  </script>
</body>
</html>
